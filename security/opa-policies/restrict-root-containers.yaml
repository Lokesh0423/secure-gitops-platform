# ConstraintTemplate: Block containers running as root
apiVersion: templates.gatekeeper.sh/v1beta1
kind: ConstraintTemplate
metadata:
  name: k8spsprestrootscontainer
  annotations:
    description: "Requires containers to run as non-root user. Part of DevSecOps shift-left policy enforcement."
spec:
  crd:
    spec:
      names:
        kind: K8sPSPRestrictRootContainers
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8spsprestrootscontainer

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.securityContext.runAsNonRoot
          msg := sprintf("Container '%v' must set securityContext.runAsNonRoot=true", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          container.securityContext.runAsUser == 0
          msg := sprintf("Container '%v' must not run as root (runAsUser=0)", [container.name])
        }

---
# Apply constraint to all namespaces except system ones
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPSPRestrictRootContainers
metadata:
  name: restrict-root-containers
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - argocd
      - monitoring
